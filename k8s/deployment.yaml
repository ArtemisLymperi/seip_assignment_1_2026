apiVersion: apps/v1
kind: Deployment
metadata:
  name: echo-api-deployment
spec:
  replicas: 3
  selector:
    matchLabels:
      app: echo-api
  template:
    metadata:
      labels:
        app: echo-api
    spec: 
      containers:
        - name: echo-api
          image: ghcr.io/artemislymperi/echo-api:latest
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 256Mi
              cpu: 250m
          env:
            - name: WELCOME_MESSAGE
              valueFrom:
                configMapKeyRef:
                  name: echo-api-config
                  key: WELCOME_MESSAGE
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: echo-api-config
                  key: NODE_ENV
            - name: API_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: echo-api-secret
                  key: API_SECRET_KEY
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
          ports:
            - containerPort: 3000